let _usVoice=null;
function loadUSVoice(){
  const voices=window.speechSynthesis.getVoices();
  const priority=['Samantha','Karen','Moira','Daniel','Google US English','Microsoft Zira','Microsoft David'];
  _usVoice=voices.find(v=>priority.some(p=>v.name.includes(p))&&v.lang.startsWith('en'))
    ||voices.find(v=>v.lang==='en-US')
    ||voices.find(v=>v.lang.startsWith('en-US'))
    ||voices.find(v=>v.lang.startsWith('en'))
    ||null;
}
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged=loadUSVoice;
  loadUSVoice();
}
function speak(t){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';
  u.rate=0.78;
  u.pitch=1.05;
  u.volume=1;
  if(_usVoice) u.voice=_usVoice;
  setTimeout(()=>window.speechSynthesis.speak(u),80);
}

function mkDeck(f){
  let d=[];
  UNITS.forEach((u,ui)=>u.vocab.forEach((v,vi)=>{
    if(f==='learned'&&!learned[ui][vi])return;
    if(f==='unseen'&&learned[ui][vi])return;
    d.push({...v,ui,uTi:u.title,uEm:u.emoji});
  }));
  for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];}
  return d;
}

  render();
}
function speakAll(){

  next();
}
function readStory(){

  function next(){if(idx>=s.length)return;speak(s[idx].en);idx++;setTimeout(next,2400);}
  next();
}
function answerQuiz(i){
  if(qans[au])return;
  const q=UNITS[au].quizzes[qi[au]];
  qans[au]=true;qcho[au]=i;
  if(i===q.a){qcor[au]++;totalStars+=2;document.getElementById('star-count').textContent='⭐ '+totalStars;speak('Correct! Well done!');}
  else speak(q.opts[q.a]);
  render();
}
function nextQuiz(){qi[au]++;qans[au]=false;qcho[au]=null;render();}

    </div>
    <div class="prog-label"><span></span><span>${Math.round((fIdx+1)/fDeck.length*100)}%</span></div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round((fIdx+1)/fDeck.length*100)}%"></div></div>
  </div>`;
}

function rEx(){
  if(!ex.on) return `<div class="rsec" style="text-align:center;padding:28px">
    <div style="font-size:52px;margin-bottom:12px">📝</div>
    <div style="font-size:18px;font-weight:900;color:#0c447c;margin-bottom:6px">Bài kiểm tra tổng hợp</div>
    <div style="font-size:13px;color:#5f5e5a;margin-bottom:4px">18 câu hỏi · 2 câu mỗi unit</div>
    <div style="font-size:13px;color:#5f5e5a;margin-bottom:18px">Mỗi câu đúng được 3 ⭐</div>
    <button class="nextbtn" style="background:#185fa5" onclick="sEx()">🎓 Bắt đầu ngay!</button>
    <button class="nextbtn" style="background:#d3d1c7;color:#444441;margin-top:8px" onclick="rv='ov';rRev()">← Quay lại</button></div>`;

  if(ex.idx>=EXAM.length){
    const cor=Object.values(ex.sc).filter(v=>v===1).length;
    const pct=Math.round(cor/EXAM.length*100);
    const gr=pct>=90?'A+':pct>=80?'A':pct>=70?'B+':pct>=60?'B':'C';
    const gc=pct>=80?'#3b6d11':pct>=60?'#ba7517':'#a32d2d';
    const gm=pct>=80?'Bé học xuất sắc! Tuyệt vời lắm!':pct>=60?'Tốt lắm! Cố gắng thêm nhé!':'Cùng ôn lại và thử lại nhé!';
    const bd=UNITS.map((u,ui)=>{
      const s1=ex.sc[ui*2]||0,s2=ex.sc[ui*2+1]||0,sc=s1+s2;
      const cls=sc===2?'sok':sc===1?'spart':'sno';
      return `<div class="brow"><span>${u.emoji}</span><span class="brow-name">Unit ${u.id}: ${u.title}</span><span class="${cls}">${sc}/2 ${'⭐'.repeat(sc)}</span></div>`;
    }).join('');
    return `<div class="unit-head"><span class="unum" style="background:#0c447c">Kết quả</span><span class="utitle">🏆 Kiểm tra hoàn thành!</span></div>
    <div class="rsec" style="text-align:center">
      <div style="font-size:56px;margin-bottom:10px">${pct>=80?'🏆':pct>=60?'😊':'💪'}</div>
      <span class="gbadge" style="background:${gc}22;color:${gc}">${gr} — ${pct}%</span>
      <div style="font-size:15px;font-weight:800;color:#0c447c;margin-bottom:4px">${cor}/${EXAM.length} câu đúng</div>
      <div style="font-size:13px;color:#5f5e5a;margin-bottom:14px">${gm}</div>
      <div class="resgrid">
        <div class="rescell"><div class="rescell-n" style="color:#3b6d11">${cor}</div><div class="rescell-l">Câu đúng</div></div>
        <div class="rescell"><div class="rescell-n" style="color:#a32d2d">${EXAM.length-cor}</div><div class="rescell-l">Câu sai</div></div>
        <div class="rescell"><div class="rescell-n" style="color:#ba7517">${pct}%</div><div class="rescell-l">Điểm số</div></div>
      </div>
      <div style="text-align:left;background:#f0f7ff;border-radius:10px;padding:12px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:900;color:#0c447c;margin-bottom:8px">Chi tiết theo từng unit:</div>
        ${bd}
      </div>
      <button class="nextbtn" style="background:#185fa5" onclick="sEx()">🔄 Làm lại bài kiểm tra</button>
      <button class="nextbtn" style="background:#639922;margin-top:8px" onclick="fFilt='all';fDeck=mkDeck('all');fIdx=0;fFlip=false;rv='fc';rRev()">🃏 Ôn lại flashcard</button>
      <button class="nextbtn" style="background:#d3d1c7;color:#444441;margin-top:8px" onclick="rv='ov';rRev()">← Về tổng quan</button>
    </div>`;
  }

  const q=EXAM[ex.idx],ans=ex.ans,cho=ex.cho;
  const cor=Object.values(ex.sc).filter(v=>v===1).length;
  return `<div class="unit-head"><span class="unum" style="background:#0c447c">Kiểm tra</span>
    <span class="utitle">📝 Câu ${ex.idx+1} / ${EXAM.length}</span>
    <button class="backbtn" onclick="ex.on=false;rRev()">✕ Dừng</button></div>
  <div class="exinfo">Tiến độ: ${ex.idx}/${EXAM.length} câu · Đúng: ${cor} câu<span>${q.ut}</span></div>
  <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(ex.idx/EXAM.length*100)}%"></div></div>
  <div class="exq${ans?(cho===q.a?' correct':' wrong'):''}">
    <div class="exqnum">Câu ${ex.idx+1}<span class="extag">${q.ut}</span></div>
    <span class="exem">${q.e}</span>
    <div class="exqtxt">${q.q}</div>
    <div class="exopts">${q.o.map((o,i)=>{
      let c='';if(ans)c=i===q.a?' ok':(i===cho?' no':'');
      return `<button class="exopt${c}" onclick="${ans?'':'aEx('+i+')'}">${o}</button>`;
    }).join('')}</div>
    ${ans?`<div class="qresult${cho===q.a?' ok':' no'}" style="margin-top:10px">
      ${cho===q.a?'🎉 Đúng rồi! Giỏi lắm!':'❌ Chưa đúng. Đáp án: <b>'+q.o[q.a]+'</b>'}
    </div>
    <button class="nextbtn" style="background:#185fa5" onclick="nEx()">${ex.idx+1<EXAM.length?'Câu tiếp theo ➡️':'🏆 Xem kết quả'}</button>`:''}
  </div>`;
}

function sEx(){ex={on:true,idx:0,ans:false,cho:null,sc:{}};rv='ex';rRev();}
function aEx(i){
  if(ex.ans)return;
  const q=EXAM[ex.idx];
  ex.ans=true;ex.cho=i;
  if(i===q.a){ex.sc[ex.idx]=1;totalStars+=3;document.getElementById('star-count').textContent='⭐ '+totalStars;speak('Correct! Well done!');}
  else{ex.sc[ex.idx]=0;speak(q.o[q.a]);}
  rRev();
}
function nEx(){ex.idx++;ex.ans=false;ex.cho=null;rRev();}

buildTabs();render();
</script>
</body>
</html>
