*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#e8f4fd;min-height:100vh;padding:12px}

.body{background:#f0f7ff;padding:16px;min-height:520px}
.unit-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}

.uconcept{font-size:11px;background:#e6f1fb;padding:3px 10px;border-radius:99px;color:#185fa5;font-weight:700;margin-left:auto}

.vgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:480px){.vgrid{grid-template-columns:repeat(2,1fr)}}
.vcard{background:#fff;border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;border:2.5px solid transparent;transition:all .18s;position:relative}
.vcard:hover{border-color:#378add;transform:translateY(-2px)}
.vcard.learned{border-color:#639922;background:#eaf3de}
.vc-emoji{font-size:34px;display:block;margin-bottom:5px}
.vc-word{font-size:13px;font-weight:800;color:#0c447c}
.vc-viet{font-size:10.5px;color:#888780;margin-top:2px}

.vc-sent{font-size:10px;color:#639922;margin-top:3px;font-style:italic;display:none}
.vcard.learned .vc-sent{display:block}
.btn-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}

.sbtn:active{transform:scale(.97)}

.sbtn-blue:hover{background:#0c447c}
.sbtn-green{background:#639922;color:#fff}
.sbtn-green:hover{background:#3b6d11}

.sline:last-child{border:none;margin:0;padding:0}

.nextbtn:hover{background:#3b6d11}

    {who:"🌍",name:"Blue Dot",en:"Where do you want to go?",vn:"Bạn muốn đi đâu?"},
    {who:"🧒",name:"Spark",en:"I want to climb a mountain!",vn:"Tôi muốn leo núi!"},
    {who:"🌍",name:"Blue Dot",en:"Pack your backpack! Let's go!",vn:"Đóng gói ba lô! Xuất phát thôi!"},
   ],
   quizzes:[
    {e:"🏔️",q:"This is a ___",opts:["ocean","desert","mountain","jungle"],a:2},
    {e:"⛺",q:"We sleep in a ___",opts:["compass","tent","backpack","flashlight"],a:1},
    {e:"🧭",q:"We use this to find direction",opts:["tent","flashlight","backpack","compass"],a:3},
   ]},
];

let au=0,mode='vocab',totalStars=0;
let learned=UNITS.map(()=>({}));
let qi=UNITS.map(()=>0),qans=UNITS.map(()=>false),qcho=UNITS.map(()=>null),qcor=UNITS.map(()=>0);

let _usVoice=null;
function loadUSVoice(){
  const voices=window.speechSynthesis.getVoices();
  const priority=['Samantha','Karen','Moira','Daniel','Google US English','Microsoft Zira','Microsoft David'];
  _usVoice=voices.find(v=>priority.some(p=>v.name.includes(p))&&v.lang.startsWith('en'))
    ||voices.find(v=>v.lang==='en-US')
    ||voices.find(v=>v.lang.startsWith('en-US'))
    ||voices.find(v=>v.lang.startsWith('en'))
    ||null;
}
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged=loadUSVoice;
  loadUSVoice();
}
function speak(t){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';
  u.rate=0.78;
  u.pitch=1.05;
  u.volume=1;
  if(_usVoice) u.voice=_usVoice;
  setTimeout(()=>window.speechSynthesis.speak(u),80);
}

function buildTabs(){
  document.getElementById('unit-tabs').innerHTML=UNITS.map((u,i)=>
    `<button class="utab${i===au?' active':''}" onclick="setUnit(${i})">${u.label}</button>`
  ).join('');
}

function setUnit(i){au=i;mode='vocab';buildTabs();render();}
function setMode(m){mode=m;render();}

function render(){
  const u=UNITS[au];
  const lc=Object.keys(learned[au]).length;
  const pct=Math.round(lc/u.vocab.length*100);
  let html=`
    <div class="unit-head">
      <span class="unum">Unit ${u.id}</span>
      <span class="utitle">${u.emoji} ${u.title}</span>
      <span class="uconcept">✨ ${u.concept}</span>
    </div>
    <div class="mode-bar">
      <button class="mbtn${mode==='vocab'?' active':''}" onclick="setMode('vocab')">📝 Từ vựng</button>
      <button class="mbtn${mode==='story'?' active':''}" onclick="setMode('story')">📖 Câu chuyện</button>
      <button class="mbtn${mode==='quiz'?' active':''}" onclick="setMode('quiz')">🎮 Luyện tập</button>
    </div>
  `;
  if(mode==='vocab'){
    html+=`
      <div class="prog-label"><span>Đã học: ${lc}/${u.vocab.length} từ</span><span>${pct}%</span></div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="vgrid">
        ${u.vocab.map((v,i)=>`
          <div class="vcard${learned[au][i]?' learned':''}" onclick="learnWord(${i})">
            <span class="vc-check">${learned[au][i]?'✅':''}</span>
            <span class="vc-emoji">${v.e}</span>
            <div class="vc-word">${v.w}</div>
            <div class="vc-viet">${v.v}</div>
            <div class="vc-sent">"${v.s}"</div>
          </div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="sbtn sbtn-blue" onclick="speakAll()">🔊 Nghe tất cả</button>
        <button class="sbtn sbtn-green" onclick="setMode('quiz')">🎮 Luyện tập ngay</button>
      </div>`;
  } else if(mode==='story'){
    html+=`
      <div class="story-box">
        <div class="story-title">📖 Mini story — ${u.title}</div>
        ${u.story.map((l,i)=>`
          <div class="sline">
            <div class="swho">${l.who}</div>
            <div class="stext">
              <div class="sname">${l.name}</div>
              <div class="sen">${l.en}</div>
              <div class="sviet">${l.vn}</div>
              <button class="splbtn" onclick="speak('${l.en.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">🔊 Nghe</button>
            </div>
          </div>`).join('')}
      </div>
      <div class="btn-row">
        <button class="sbtn sbtn-blue" onclick="readStory()">🔊 Đọc cả câu chuyện</button>
        <button class="sbtn sbtn-green" onclick="setMode('quiz')">🎮 Làm bài tập</button>
      </div>`;
  } else {
    const idx=qi[au];
    if(idx>=u.quizzes.length){
      const s=qcor[au],t=u.quizzes.length;
      html+=`
        <div class="result-card">
          <span class="result-emoji">${s===t?'🏆':s>=t/2?'😊':'💪'}</span>
          <div class="result-title">${s}/${t} câu đúng!</div>
          <div class="result-sub">${s===t?'Xuất sắc! Bé học rất giỏi!':s>=1?'Tốt lắm! Hãy ôn lại nhé!':'Cùng học lại từ vựng nhé!'}</div>
          <div class="result-stars">${'⭐'.repeat(s)}</div>
          <button class="nextbtn" onclick="resetQuiz()">🔄 Làm lại</button>
          <button class="nextbtn" style="background:#185fa5;margin-top:6px" onclick="setMode('vocab')">📝 Ôn từ vựng</button>
        </div>`;
    } else {
      const q=u.quizzes[idx],ans=qans[au],cho=qcho[au];
      html+=`
        <div class="qwrap">
          <div class="qprog">
            <span class="qscore">Câu ${idx+1}/${u.quizzes.length}</span>
            <span class="qscore">⭐ ${qcor[au]} đúng</span>
          </div>
          <div class="prog-wrap"><div class="prog-fill" style="width:${Math.round(idx/u.quizzes.length*100)}%"></div></div>
          <div class="qcard">
            <span class="qemoji">${q.e}</span>
            <div class="qq">${q.q}</div>
            <div class="qhint">Chọn đáp án đúng!</div>
            <div class="qopts">
              ${q.opts.map((o,i)=>{
                let c='';
                if(ans) c=i===q.a?'ok':(i===cho?'no':'');
                return `<button class="qopt${c?' '+c:''}" onclick="${ans?'':'answerQuiz('+i+')'}">${o}</button>`;
              }).join('')}
            </div>
            ${ans?`
              <div class="qresult${cho===q.a?' ok':' no'}">
                ${cho===q.a?'🎉 Đúng rồi! Giỏi lắm!':'❌ Chưa đúng. Đáp án: '+q.opts[q.a]}
              </div>
              <button class="nextbtn" onclick="nextQuiz()">Câu tiếp theo ➡️</button>`:''}
          </div>
        </div>`;
    }
  }
  document.getElementById('app-body').innerHTML=html;
}

function learnWord(i){
  speak(UNITS[au].vocab[i].w);
  if(!learned[au][i]){learned[au][i]=true;totalStars++;document.getElementById('star-count').textContent='⭐ '+totalStars;}
  render();
}
function speakAll(){
  const v=UNITS[au].vocab;let idx=0;
  function next(){if(idx>=v.length)return;speak(v[idx].w);idx++;setTimeout(next,1400);}
  next();
}
function readStory(){
  const s=UNITS[au].story;let idx=0;
  function next(){if(idx>=s.length)return;speak(s[idx].en);idx++;setTimeout(next,2400);}
  next();
}
function answerQuiz(i){
  if(qans[au])return;
  const q=UNITS[au].quizzes[qi[au]];
  qans[au]=true;qcho[au]=i;
  if(i===q.a){qcor[au]++;totalStars+=2;document.getElementById('star-count').textContent='⭐ '+totalStars;speak('Correct! Well done!');}
  else speak(q.opts[q.a]);
  render();
}
function nextQuiz(){qi[au]++;qans[au]=false;qcho[au]=null;render();}
function resetQuiz(){qi[au]=0;qans[au]=false;qcho[au]=null;qcor[au]=0;render();}

buildTabs();render();
</script>
</body>
</html>
