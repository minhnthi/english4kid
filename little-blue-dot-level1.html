<style>

body{font-family:'Nunito',sans-serif;background:#faeeda;min-height:100vh;padding:12px}

.tab{padding:8px 12px;border-radius:10px 10px 0 0;cursor:pointer;font-size:11px;font-weight:800;color:#fac775;white-space:nowrap;background:rgba(255,255,255,.12);flex-shrink:0;border:none;font-family:inherit;transition:all .15s}

.body{background:#fffbf2;padding:16px;min-height:520px}
.uhead{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.unum{background:#ba7517;color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:99px}
.utitle{font-size:16px;font-weight:800;color:#633806}
.uconcept{font-size:11px;background:#faeeda;padding:3px 10px;border-radius:99px;color:#ba7517;font-weight:700;margin-left:auto}
.modebar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.mbtn{padding:8px 14px;border-radius:8px;border:2px solid #fac775;background:#fff;color:#ba7517;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s}

.vcard.ok{border-color:#ba7517;background:#faeeda}
.vemoji{font-size:34px;display:block;margin-bottom:5px}
.vword{font-size:13px;font-weight:800;color:#633806}
.vviet{font-size:10.5px;color:#888780;margin-top:2px}
.vcheck{position:absolute;top:5px;right:7px;font-size:12px}
.vsent{font-size:10px;color:#ba7517;margin-top:3px;font-style:italic;display:none}

.btnrow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}

.sname{font-size:10px;font-weight:800;color:#888780;margin-bottom:2px}

.sviet{font-size:11px;color:#5f5e5a}

.qcard{background:#fff;border-radius:14px;padding:16px;text-align:center}
.qemoji{font-size:54px;margin:8px 0;display:block}
.qq{font-size:15px;font-weight:800;color:#633806;margin-bottom:5px}
.qhint{font-size:12px;color:#888780;margin-bottom:12px}

.qopt.ok{background:#eaf3de;color:#3b6d11;border-color:#639922}
.qopt.no{background:#fcebeb;color:#a32d2d;border-color:#e24b4a}

.qres.ok{background:#eaf3de;color:#3b6d11}
.qres.no{background:#fcebeb;color:#a32d2d}

.rbadge{background:#ba7517;color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px}

.fccount{font-size:12px;color:#5f5e5a;font-weight:700}
.rfilt{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.rfbtn{padding:6px 12px;border-radius:8px;border:1.5px solid #fac775;background:#fff;color:#ba7517;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit}
.rfbtn.act{background:#ba7517;color:#fff;border-color:#ba7517}

.exq{background:#fff;border-radius:14px;padding:16px;border:2px solid #faeeda;transition:border-color .2s}
.exq.correct{border-color:#639922;background:#eaf3de}
.exq.wrong{border-color:#e24b4a;background:#fcebeb}
.exqnum{font-size:10px;font-weight:800;color:#888780;margin-bottom:4px}
.extag{font-size:10px;background:#faeeda;color:#ba7517;padding:1px 7px;border-radius:99px;font-weight:800;margin-left:6px}
.exqtxt{font-size:14px;font-weight:800;color:#633806;margin-bottom:10px}
.exem{font-size:40px;display:block;text-align:center;margin-bottom:8px}

.rescell{background:#faeeda;border-radius:10px;padding:10px 6px;text-align:center}
.rescell-n{font-size:20px;font-weight:900;color:#633806}
.rescell-l{font-size:10px;color:#ba7517;font-weight:700}
.brow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid #faeeda;font-size:12px}

.brow-name{flex:1;font-weight:700;color:#633806}
.sok{color:#3b6d11;font-weight:800}
.spart{color:#ba7517;font-weight:800}
.sno{color:#a32d2d;font-weight:800}
.gbadge{display:inline-block;padding:6px 20px;border-radius:99px;font-size:18px;font-weight:900;margin-bottom:10px}

</head>

/* ── Voice ── */
let _v=null;
function lv(){
  const vs=window.speechSynthesis.getVoices();
  const p=['Samantha','Karen','Moira','Google US English','Microsoft Zira','Microsoft David'];
  _v=vs.find(v=>p.some(x=>v.name.includes(x))&&v.lang.startsWith('en'))||vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'))||null;
}
if('speechSynthesis' in window){window.speechSynthesis.onvoiceschanged=lv;lv();}
function spk(t){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';u.rate=0.75;u.pitch=1.1;u.volume=1;
  if(_v)u.voice=_v;
  setTimeout(()=>window.speechSynthesis.speak(u),80);
}

/* ── Deck ── */
function mkDeck(f){
  let d=[];
  U.forEach((u,ui)=>u.vocab.forEach((v,vi)=>{
    if(f==='learned'&&!learned[ui][vi])return;
    if(f==='unseen'&&learned[ui][vi])return;
    d.push({...v,ui,uTi:u.ti,uEm:u.em});
  }));
  for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];}
  return d;
}

    <div class="rsec" style="text-align:center">
      <div style="font-size:56px;margin-bottom:10px">${pct>=80?'🏆':pct>=60?'😊':'💪'}</div>
      <span class="gbadge" style="background:${gc}22;color:${gc}">${gr} — ${pct}%</span>
      <div style="font-size:15px;font-weight:800;color:#633806;margin-bottom:4px">${cor}/${EXAM.length} câu đúng</div>
      <div style="font-size:13px;color:#5f5e5a;margin-bottom:14px">${gm}</div>
      <div class="resgrid">
        <div class="rescell"><div class="rescell-n" style="color:#3b6d11">${cor}</div><div class="rescell-l">Câu đúng</div></div>
        <div class="rescell"><div class="rescell-n" style="color:#a32d2d">${EXAM.length-cor}</div><div class="rescell-l">Câu sai</div></div>
        <div class="rescell"><div class="rescell-n" style="color:#ba7517">${pct}%</div><div class="rescell-l">Điểm số</div></div>
      </div>
      <div style="text-align:left;background:#fffbf2;border-radius:10px;padding:12px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:900;color:#633806;margin-bottom:8px">Chi tiết theo từng unit:</div>
        ${bd}
      </div>
      <button class="nxtbtn" onclick="sEx()">🔄 Làm lại bài kiểm tra</button>
      <button class="nxtbtn" style="background:#0f6e56;margin-top:8px" onclick="fFilt='all';fDeck=mkDeck('all');fIdx=0;fFlip=false;rv='fc';rRev()">🃏 Ôn lại flashcard</button>
      <button class="nxtbtn" style="background:#d3d1c7;color:#444441;margin-top:8px" onclick="rv='ov';rRev()">← Về tổng quan</button>
    </div>`;
  }

  const q=EXAM[ex.idx],ans=ex.ans,cho=ex.cho;
  const cor=Object.values(ex.sc).filter(v=>v===1).length;
  return `<div class="uhead"><span class="unum" style="background:#854f0b">Kiểm tra</span>
    <span class="utitle">📝 Câu ${ex.idx+1} / ${EXAM.length}</span>
    <button class="backbtn" onclick="ex.on=false;rRev()">✕ Dừng</button></div>
  <div class="exinfo">Tiến độ: ${ex.idx}/${EXAM.length} câu · Đúng: ${cor} câu<span>${q.ut}</span></div>
  <div class="pbar"><div class="pbar-fill" style="width:${Math.round(ex.idx/EXAM.length*100)}%"></div></div>
  <div class="exq${ans?(cho===q.a?' correct':' wrong'):''}">
    <div class="exqnum">Câu ${ex.idx+1}<span class="extag">${q.ut}</span></div>
    <span class="exem">${q.e}</span>
    <div class="exqtxt">${q.q}</div>
    <div class="exopts">${q.o.map((o,i)=>{
      let c='';if(ans)c=i===q.a?' ok':(i===cho?' no':'');
      return `<button class="exopt${c}" onclick="${ans?'':'aEx('+i+')'}">${o}</button>`;
    }).join('')}</div>
    ${ans?`<div class="qres${cho===q.a?' ok':' no'}" style="margin-top:10px">
      ${cho===q.a?'🎉 Đúng rồi! Giỏi lắm!':'❌ Chưa đúng. Đáp án: <b>'+q.o[q.a]+'</b>'}
    </div>
    <button class="nxtbtn" onclick="nEx()">${ex.idx+1<EXAM.length?'Câu tiếp theo ➡️':'🏆 Xem kết quả'}</button>`:''}
  </div>`;
}

/* ── Unit actions ── */
function lw(i){
  spk(U[au].vocab[i].w);
  if(!learned[au][i]){learned[au][i]=true;stars++;document.getElementById('sc').textContent='⭐ '+stars;}
  render();
}
function saAll(){const v=U[au].vocab;let i=0;function nx(){if(i>=v.length)return;spk(v[i].w);i++;setTimeout(nx,1400);}nx();}
function saStory(){const s=U[au].story;let i=0;function nx(){if(i>=s.length)return;spk(s[i].e);i++;setTimeout(nx,2400);}nx();}
function aqz(i){
  if(qa[au])return;
  const q=U[au].qz[qi[au]];
  qa[au]=true;qc[au]=i;
  if(i===q.a){qok[au]++;stars+=2;document.getElementById('sc').textContent='⭐ '+stars;spk('Correct! Well done!');}
  else spk(q.o[q.a]);
  render();
}
function nqz(){qi[au]++;qa[au]=false;qc[au]=null;render();}
function rqz(){qi[au]=0;qa[au]=false;qc[au]=null;qok[au]=0;render();}

/* ── Exam actions ── */
function sEx(){ex={on:true,idx:0,ans:false,cho:null,sc:{}};rv='ex';rRev();}
function aEx(i){
  if(ex.ans)return;
  const q=EXAM[ex.idx];
  ex.ans=true;ex.cho=i;
  if(i===q.a){ex.sc[ex.idx]=1;stars+=3;document.getElementById('sc').textContent='⭐ '+stars;spk('Correct! Well done!');}
  else{ex.sc[ex.idx]=0;spk(q.o[q.a]);}
  rRev();
}
function nEx(){ex.idx++;ex.ans=false;ex.cho=null;rRev();}

bTabs();render();
</script>
</body>
</html>
